<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Portal - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <div class="logo-section">
                <h1>🏢 HR Portal</h1>
                <p>Employee Management System</p>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-button active" onclick="switchTab('login')">Login</button>
                <button class="tab-button" onclick="switchTab('signup')">Sign Up</button>
                <button class="tab-button" onclick="switchTab('reset')">Reset Password</button>
            </div>

            <!-- Login Tab -->
            <div id="login-tab" class="tab-content active">
                <h2>Login to Your Account</h2>
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="login-username">Email / Username</label>
                        <input type="text" id="login-username" required placeholder="hr@portal.com">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                    <p class="info-text">Default HR: hr@portal.com / hrpass123</p>
                </form>
                <div id="login-message"></div>
            </div>

            <!-- Sign Up Tab -->
            <div id="signup-tab" class="tab-content">
                <h2>Create an Account</h2>
                <form id="signup-form" onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label for="signup-name">Full Name</label>
                        <input type="text" id="signup-name" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="signup-email">Email Address</label>
                        <input type="email" id="signup-email" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label for="signup-mobile">Mobile Number</label>
                        <input type="text" id="signup-mobile" required placeholder="9876543210" maxlength="10">
                    </div>
                    <div class="form-group">
                        <label for="signup-empid">Employee ID</label>
                        <input type="text" id="signup-empid" required placeholder="EMP001">
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary">Create Account</button>
                </form>
                <div id="signup-message"></div>
            </div>

            <!-- Reset Password Tab -->
            <div id="reset-tab" class="tab-content">
                <h2>Reset Your Password</h2>
                <form id="reset-form" onsubmit="handleReset(event)">
                    <div class="form-group">
                        <label for="reset-username">Email / Username</label>
                        <input type="text" id="reset-username" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label for="reset-empid">Employee ID</label>
                        <input type="text" id="reset-empid" required placeholder="EMP001">
                    </div>
                    <div class="form-group">
                        <label for="reset-mobile">Mobile Number</label>
                        <input type="text" id="reset-mobile" required placeholder="9876543210">
                    </div>
                    <div class="form-group">
                        <label for="reset-password">New Password</label>
                        <input type="password" id="reset-password" required placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label for="reset-confirm">Confirm Password</label>
                        <input type="password" id="reset-confirm" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary">Reset Password</button>
                </form>
                <div id="reset-message"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        // Check if already logged in
        checkAuthStatus();

        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('login-username').value.toLowerCase();
            const password = document.getElementById('login-password').value;

            fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'include',
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showMessage('login-message', 'Login successful! Redirecting...', 'success');
                    const user = data.user;
                    setTimeout(() => {
                        if (user.role === 'HR') {
                            window.location.href = '/hr-dashboard';
                        } else {
                            window.location.href = '/dashboard';
                        }
                    }, 1000);
                } else {
                    showMessage('login-message', data.error || 'Login failed', 'error');
                }
            })
            .catch(error => showMessage('login-message', 'Error: ' + error, 'error'));
        }

        function handleSignup(event) {
            event.preventDefault();
            const username = document.getElementById('signup-email').value.toLowerCase();
            const password = document.getElementById('signup-password').value;
            const full_name = document.getElementById('signup-name').value;
            const mobile_number = document.getElementById('signup-mobile').value;
            const employee_id = document.getElementById('signup-empid').value;

            if (mobile_number.length !== 10) {
                showMessage('signup-message', 'Mobile number must be 10 digits', 'error');
                return;
            }

            fetch('/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username,
                    password,
                    full_name,
                    mobile_number,
                    employee_id
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showMessage('signup-message', 'Account created! You can now login.', 'success');
                    setTimeout(() => {
                        document.getElementById('signup-form').reset();
                        switchTab('login');
                    }, 1500);
                } else {
                    showMessage('signup-message', data.error || 'Registration failed', 'error');
                }
            })
            .catch(error => showMessage('signup-message', 'Error: ' + error, 'error'));
        }

        function handleReset(event) {
            event.preventDefault();
            const username = document.getElementById('reset-username').value.toLowerCase();
            const employee_id = document.getElementById('reset-empid').value;
            const mobile_number = document.getElementById('reset-mobile').value;
            const new_password = document.getElementById('reset-password').value;
            const confirm_password = document.getElementById('reset-confirm').value;

            if (new_password !== confirm_password) {
                showMessage('reset-message', 'Passwords do not match', 'error');
                return;
            }

            fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username,
                    employee_id,
                    mobile_number,
                    new_password
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showMessage('reset-message', 'Password reset successfully!', 'success');
                    setTimeout(() => {
                        document.getElementById('reset-form').reset();
                        switchTab('login');
                    }, 1500);
                } else {
                    showMessage('reset-message', data.error || 'Reset failed', 'error');
                }
            })
            .catch(error => showMessage('reset-message', 'Error: ' + error, 'error'));
        }

        function showMessage(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = 'message ' + type;
        }
    </script>
</body>
</html>

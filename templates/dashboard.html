<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applicant Dashboard - HR Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>🏢 HR Portal</h3>
            </div>
            <div class="user-info">
                <p><strong id="user-name">{{ user.full_name }}</strong></p>
                <p class="role">Applicant</p>
            </div>
            <nav class="sidebar-nav">
                <a href="#" onclick="showTab('submit')" class="nav-item active">📝 Submit Request</a>
                <a href="#" onclick="showTab('history')" class="nav-item">🔍 My Submissions</a>
            </nav>
            <button onclick="logout()" class="btn btn-danger" style="width: 100%; margin-top: auto;">Logout</button>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h2>Welcome, <span id="user-full-name">{{ user.full_name }}</span>! 👋</h2>
                <p id="time-display"></p>
            </header>

            <!-- Submit Request Tab -->
            <section id="submit-tab" class="tab-section active">
                <div class="card">
                    <h2>📝 Submit New Request</h2>
                    <form id="ticket-form" onsubmit="submitTicket(event)">
                        <div class="form-group">
                            <label for="ticket-type">Type</label>
                            <select id="ticket-type" required>
                                <option value="">Select type...</option>
                                <option value="Feedback">Feedback</option>
                                <option value="Complaint">Complaint</option>
                                <option value="Suggestion">Suggestion</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="ticket-subject">Subject</label>
                            <input type="text" id="ticket-subject" required placeholder="Brief subject...">
                        </div>
                        <div class="form-group">
                            <label for="ticket-description">Description</label>
                            <textarea id="ticket-description" required placeholder="Detailed information..." rows="6"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Submit Request</button>
                    </form>
                    <div id="submit-message"></div>
                </div>
            </section>

            <!-- History Tab -->
            <section id="history-tab" class="tab-section">
                <div class="card">
                    <h2>🔍 My Submission History</h2>
                    <div id="tickets-container" class="tickets-grid">
                        <p class="loading">Loading submissions...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for viewing ticket details -->
    <div id="ticket-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modal-body">
                <!-- Filled dynamically -->
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            checkAuthStatus();
            updateTime();
            setInterval(updateTime, 60000);
            loadTickets();
        });

        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-section').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'history') {
                loadTickets();
            }
        }

        function submitTicket(event) {
            event.preventDefault();
            const type = document.getElementById('ticket-type').value;
            const subject = document.getElementById('ticket-subject').value;
            const description = document.getElementById('ticket-description').value;

            fetch('/api/tickets', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'include',
                body: JSON.stringify({ type, subject, description })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showMessage('submit-message', '✅ Ticket submitted successfully! ID: ' + data.ticket.id, 'success');
                    document.getElementById('ticket-form').reset();
                    setTimeout(() => {
                        loadTickets();
                        showTab('history');
                    }, 1500);
                } else {
                    showMessage('submit-message', '❌ ' + (data.error || 'Submission failed'), 'error');
                }
            })
            .catch(error => showMessage('submit-message', '❌ Error: ' + error, 'error'));
        }

        function loadTickets() {
            fetch('/api/tickets', {
                credentials: 'include'
            })
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('tickets-container');
                if (!data.tickets || data.tickets.length === 0) {
                    container.innerHTML = '<p class="empty-state">No submissions yet.</p>';
                    return;
                }

                container.innerHTML = data.tickets.map(ticket => `
                    <div class="ticket-card" onclick="viewTicket(${ticket.id})">
                        <div class="ticket-header">
                            <h3>#${ticket.id}: ${ticket.subject}</h3>
                            <span class="ticket-type">${ticket.type}</span>
                        </div>
                        <p class="ticket-date">${new Date(ticket.created_at).toLocaleDateString()}</p>
                        <p class="ticket-status">
                            Status: <span class="status-badge ${ticket.status.toLowerCase()}">${ticket.status}</span>
                        </p>
                        <p class="ticket-preview">${ticket.description.substring(0, 100)}...</p>
                    </div>
                `).join('');
            })
            .catch(error => console.error('Error loading tickets:', error));
        }

        function viewTicket(ticketId) {
            fetch(`/api/tickets/${ticketId}`, {
                credentials: 'include'
            })
            .then(response => response.json())
            .then(data => {
                const ticket = data.ticket;
                const modal = document.getElementById('ticket-modal');
                const modalBody = document.getElementById('modal-body');
                
                modalBody.innerHTML = `
                    <h2>Ticket #${ticket.id}</h2>
                    <div class="modal-section">
                        <strong>Subject:</strong> ${ticket.subject}
                    </div>
                    <div class="modal-section">
                        <strong>Type:</strong> ${ticket.type}
                    </div>
                    <div class="modal-section">
                        <strong>Status:</strong> <span class="status-badge ${ticket.status.toLowerCase()}">${ticket.status}</span>
                    </div>
                    <div class="modal-section">
                        <strong>Submitted:</strong> ${new Date(ticket.created_at).toLocaleString()}
                    </div>
                    <div class="modal-section">
                        <strong>Your Message:</strong>
                        <p>${ticket.description}</p>
                    </div>
                    <div class="modal-section">
                        <strong>HR Response:</strong>
                        <p>${ticket.hr_notes || 'Awaiting response...'}</p>
                    </div>
                `;
                
                modal.style.display = 'block';
            })
            .catch(error => console.error('Error:', error));
        }

        function closeModal() {
            document.getElementById('ticket-modal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('ticket-modal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                fetch('/api/auth/logout', {
                    method: 'POST',
                    credentials: 'include'
                })
                .then(() => {
                    window.location.href = '/';
                });
            }
        }

        function showMessage(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = 'message ' + type;
            setTimeout(() => {
                element.textContent = '';
                element.className = '';
            }, 5000);
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('time-display').textContent = now.toLocaleTimeString();
        }
    </script>
</body>
</html>
